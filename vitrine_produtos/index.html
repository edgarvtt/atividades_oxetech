<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">Minha Loja</h1>

            <nav>
                <ul class="flex gap-6">
                    <li><a href="#" class="hover:text-blue-600">Home</a></li>
                    <li><a href="#" class="hover:text-blue-600">Produtos</a></li>
                    <li><a href="#" class="hover:text-blue-600">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="bg-blue-600 text-white text-center py-20">
        <h2 class="text-4xl font-bold mb-4">
            Encontre os Melhores Produtos
        </h2>

        <p class="text-lg mb-6">
            Qualidade, preço justo e entrega rápida para você.
        </p>

        <button class="bg-white text-blue-600 px-6 py-3 rounded-lg font-semibold hover:bg-gray-200">
            Comprar Agora
        </button>
    </section>

    <!-- Grid de Produtos -->
    <main class="container mx-auto px-6 py-12">
        <h2 class="text-3xl font-bold text-center mb-10">
            Produtos em Destaque
        </h2>

        <!-- Responsividade:
             celular = 1 coluna
             desktop = 3 colunas -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

            <!-- Produto 1 -->
            <div class="bg-white rounded-lg shadow-md p-4 text-center">
                <img
                    src="https://via.placeholder.com/300x200"
                    alt="Produto 1"
                    class="w-full rounded-md mb-4"
                >

                <h3 class="text-xl font-semibold mb-2">
                    Produto 1
                </h3>

                <p class="text-green-600 text-lg font-bold mb-4">
                    R$ 99,90
                </p>

                <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Comprar
                </button>
            </div>

            <!-- Produto 2 -->
            <div class="bg-white rounded-lg shadow-md p-4 text-center">
                <img
                    src="https://via.placeholder.com/300x200"
                    alt="Produto 2"
                    class="w-full rounded-md mb-4"
                >

                <h3 class="text-xl font-semibold mb-2">
                    Produto 2
                </h3>

                <p class="text-green-600 text-lg font-bold mb-4">
                    R$ 149,90
                </p>

                <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Comprar
                </button>
            </div>

            <!-- Produto 3 -->
            <div class="bg-white rounded-lg shadow-md p-4 text-center">
                <img
                    src="https://via.placeholder.com/300x200"
                    alt="Produto 3"
                    class="w-full rounded-md mb-4"
                >

                <h3 class="text-xl font-semibold mb-2">
                    Produto 3
                </h3>

                <p class="text-green-600 text-lg font-bold mb-4">
                    R$ 199,90
                </p>

                <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Comprar
                </button>
            </div>

        </div>
    </main>

    <footer class="bg-gray-800 text-white text-center py-4">
        <p>&copy; 2026 Minha Loja. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
