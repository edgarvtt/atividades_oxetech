<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevFinder — GitHub Profile Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

</head>
<body class="scanlines">

  <!-- ══════════════════ HEADER ══════════════════ -->
  <header style="border-bottom:1px solid #1a1a1a;">
    <div class="max-w-3xl mx-auto px-6 py-8">

      <!-- Logo row -->
      <div class="flex items-center gap-3 mb-1">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
        <span class="mono text-xs tracking-widest" style="color:#555;">DEVFINDER</span>
      </div>

      <h1 class="mono font-bold leading-tight" style="font-size:clamp(1.6rem,4vw,2.4rem); color:#BDBDBD;">
        GitHub Profile
        <br/>
        <span style="color:#555;">Search Engine</span>
      </h1>

      <p class="mt-3 text-sm" style="color:#555; max-width:380px; line-height:1.6;">
        Digite um nome de usuário para inspecionar o perfil e repositórios públicos.
      </p>

      <!-- Search form -->
      <div class="mt-7">
        <form id="searchForm" class="flex gap-0" autocomplete="off">
          <div class="prompt-wrap flex-1">
            <span class="prompt-label">$ gh user</span>
            <input
              id="usernameInput"
              class="prompt-input cursor"
              type="text"
              placeholder="torvalds"
              aria-label="Nome de usuário no GitHub"
            />
          </div>
          <button id="searchBtn" class="btn-search" type="submit">
            BUSCAR →
          </button>
        </form>
        <!-- Inline validation message -->
        <div id="inputError" class="hidden mt-3 notice warn" role="alert"></div>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-10" id="main">

    <!-- Empty state -->
    <div id="emptyState" class="text-center py-20" style="color:#2a2a2a;">
      <svg class="mx-auto mb-4" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p class="mono text-sm tracking-widest">AGUARDANDO CONSULTA</p>
    </div>

    <!-- Loader -->
    <div id="loader" class="hidden space-y-4">
      <div class="profile-card p-6">
        <div class="flex items-center gap-5">
          <div class="skeleton rounded-full" style="width:72px;height:72px;flex-shrink:0;"></div>
          <div class="flex-1 space-y-2">
            <div class="skeleton h-4 w-40"></div>
            <div class="skeleton h-3 w-24"></div>
            <div class="skeleton h-3 w-56 mt-1"></div>
          </div>
        </div>
        <div class="mt-5 flex gap-3">
          <div class="skeleton h-12 w-24"></div>
          <div class="skeleton h-12 w-24"></div>
          <div class="skeleton h-12 w-24"></div>
        </div>
      </div>
      <div class="flex gap-2 flex-wrap">
        <div class="skeleton h-8 w-28"></div>
        <div class="skeleton h-8 w-36"></div>
        <div class="skeleton h-8 w-24"></div>
        <div class="skeleton h-8 w-40"></div>
      </div>
    </div>

    <!-- estado de error -->
    <div id="errorState" class="hidden notice err" role="alert"></div>

    <!-- Resultado -->
    <div id="results" class="hidden space-y-6">

      <!-- Perfil Card -->
      <div id="profileCard" class="profile-card p-6">
        <div class="flex items-start gap-5">
          <div class="avatar-ring flex-shrink-0">
            <img id="avatar" class="avatar-img" width="72" height="72" src="" alt="Avatar"/>
          </div>
          <div class="min-w-0">
            <h2 id="profileName" class="mono font-bold text-lg leading-tight" style="color:#BDBDBD;"></h2>
            <a id="profileLogin" href="#" target="_blank" rel="noopener" class="mono text-sm" style="color:#555; text-decoration:none; transition: color .15s;"
               onmouseover="this.style.color='#999'" onmouseout="this.style.color='#555'"></a>
            <p id="profileBio" class="mt-2 text-sm leading-relaxed" style="color:#777; max-width:480px;"></p>
          </div>
        </div>

        <div class="mt-5 flex flex-wrap gap-3" id="statsRow">
          <div class="stat-pill">
            <span id="statRepos">—</span>repos
          </div>
          <div class="stat-pill">
            <span id="statFollowers">—</span>followers
          </div>
          <div class="stat-pill">
            <span id="statFollowing">—</span>following
          </div>
        </div>

        <div id="metaRow" class="mt-4 flex flex-wrap gap-4"></div>
      </div>

      <div>
        <div class="flex items-center gap-3 mb-4">
          <span class="mono text-xs tracking-widest" style="color:#555;">REPOSITÓRIOS RECENTES</span>
          <hr class="h-rule flex-1"/>
          <span id="repoCount" class="mono text-xs" style="color:#3d3d3d;"></span>
        </div>
        <div id="reposGrid" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

  </main>

  <footer style="border-top:1px solid #111; margin-top:60px;">
    <div class="max-w-3xl mx-auto px-6 py-5 flex items-center justify-between">
      <span class="mono text-xs" style="color:#2a2a2a;">DEVFINDER · Projeto Oxetech </span>
      <span class="mono text-xs" style="color:#2a2a2a;">2026</span>
    </div>
  </footer>

<script src="/avaliação 1/script.js"></script>

</body>
</html>
